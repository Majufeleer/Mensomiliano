<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carta Cumpleaños</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  overflow:hidden;
  color:white;
  background-image: url("sources/ff.jpg");
  background-size: cover;
  background-position: center;

  /* oscurecer para que se lea el texto */
  background-blend-mode: darken;
  background-color: rgba(0,0,0,0.5);
}

/* CARTA */
.envelope{
  width:200px;
  height:120px;
    background-image:url("sources/34.png");
  position:relative;
  cursor:pointer;
  transition:0.5s;
}

.envelope:before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#ff1a1a;
  clip-path: polygon(0 0, 50% 60%, 100% 0);
  transition:0.5s;
}

.open:before{
  transform:rotateX(180deg);
}

/* CONTENIDO */
.content{
  display:none;
  text-align:center;
  
}


.show{
  display:block;
}

/* PASTEL */
.cake{
   font-size:250px; /* más grande */
  opacity:0;
  transform:scale(0);
  transition:1s;
}
.show-cake{
  opacity:1;
  transform:scale(1);
}

/* FUEGOS */
.firework{
 position:absolute;
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
  animation: explode 3s ease-out forwards; /* antes 1s */
}

@keyframes explode{
  0%{
    transform:scale(1);
    opacity:1;
  }
  100%{
    transform:scale(40); /* más grande */
    opacity:0;}
}
h2{
  margin-bottom: 20px;
}

h3{
  margin-top: 10px;
}
</style>
</head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<body>

<!-- CARTA -->
<div class="envelope" onclick="abrirCarta()"></div>

<div class="content" id="contenido">
  <h2>🎉 ¡Feliz Cumpleaños Misimiliano!</h2>
  <h3>(Superaste el reto de los 12)</h3>

  <audio id="audio">
    <source src="sources/mamabicho.mp3" type="audio/mpeg">
  </audio>

  <button id="btnAudio" class="btn btn-primary mt-3" onclick="toggleMusica()">
    ▶ Reproducir
  </button>

  <div class="progress mt-3" style="width:300px; margin:auto; cursor:pointer;">
    <div id="barra" class="progress-bar bg-primary" style="width:0%"></div>
  </div>

  <div class="cake mt-4" id="cake">🎂</div>
</div>

<script>
let audio = document.getElementById("audio");
let barra = document.getElementById("barra");
let btnAudio = document.getElementById("btnAudio");

function abrirCarta(){
  document.querySelector('.envelope').classList.add('open');
  setTimeout(()=>{
    document.querySelector('.envelope').style.display="none";
    document.getElementById('contenido').classList.add('show');
  },500);
}

function toggleMusica(){
  if (audio.paused) {
    audio.play();
    btnAudio.innerText = " Pausar";
    lanzarEfectos(); // Lanza el pastel y fuegos solo al dar play
  } else {
    audio.pause();
    btnAudio.innerText = " Reproducir";
  }
}

function lanzarEfectos(){
  // Mostrar pastel
  document.getElementById("cake").classList.add("show-cake");

  // Fuegos artificiales
  for(let i=0; i<20; i++){
    let f = document.createElement("div");
    f.classList.add("firework");
    f.style.left = Math.random()*100+"%";
    f.style.top = Math.random()*100+"%";
    document.body.appendChild(f);
    setTimeout(()=>{ f.remove(); }, 5000);
  }
}

// Actualizar la barra azul automáticamente
audio.addEventListener("timeupdate", () => {
  if (audio.duration) {
    let progreso = (audio.currentTime / audio.duration) * 100;
    barra.style.width = progreso + "%";
  }
});

// Poder hacer clic en la barra azul para adelantar/atrasar
document.querySelector(".progress").addEventListener("click", (e) => {
  let ancho = e.currentTarget.clientWidth;
  let clickX = e.offsetX;
  audio.currentTime = (clickX / ancho) * audio.duration;
});
</script>

</body>
</html>
